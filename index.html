<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Newsqu - Portal Berita</title>

<meta name="description" content="Portal berita modern Indonesia">

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100 dark:bg-gray-900 text-gray-800 dark:text-white">

<!-- HEADER -->
<header class="bg-white dark:bg-gray-800 shadow sticky top-0 z-50">
  <div class="max-w-7xl mx-auto flex justify-between items-center p-4">
    <h1 class="text-2xl font-bold text-red-600">NewsPro</h1>

    <div class="flex gap-3">
      <input id="search" placeholder="Cari berita..."
        class="px-3 py-1 border rounded text-black">

      <button onclick="toggleDark()">🌙</button>
    </div>
  </div>

  <!-- MENU -->
  <nav class="bg-red-600 text-white px-4 py-2 flex gap-4 overflow-x-auto">
    <span>Home</span>
    <span>Nasional</span>
    <span>Teknologi</span>
    <span>Bisnis</span>
    <span>Olahraga</span>
  </nav>
</header>

<!-- HERO -->
<section class="max-w-7xl mx-auto p-4">
  <div id="headline" class="grid md:grid-cols-2 gap-4"></div>
</section>

<!-- MAIN -->
<section class="max-w-7xl mx-auto p-4 grid md:grid-cols-3 gap-6">

  <!-- LIST BERITA -->
  <div id="news" class="md:col-span-2 grid gap-4"></div>

  <!-- SIDEBAR -->
  <aside>
    <div class="bg-white dark:bg-gray-800 p-4 mb-4 shadow">
      <h3 class="font-bold mb-2">Trending</h3>
      <div id="trending"></div>
    </div>

    <!-- IKLAN -->
    <div class="bg-white dark:bg-gray-800 p-6 text-center shadow">
      Ad Space
    </div>
  </aside>

</section>

<!-- FOOTER -->
<footer class="bg-gray-800 text-white text-center p-6 mt-10">
  © 2026 NewsPro | Profesional News Portal
</footer>

<script src="assets/js/api.js"></script>

<script>
const newsContainer = document.getElementById("news");
const headlineContainer = document.getElementById("headline");
const trendingContainer = document.getElementById("trending");

/* LOADING */
newsContainer.innerHTML = "Loading berita...";

/* FETCH DATA */
async function loadNews() {
  try {
    const data = await getNews();

    if (!data.articles || data.articles.length === 0) {
      throw "No data";
    }

    renderHeadline(data.articles.slice(0,2));
    renderNews(data.articles.slice(2));
    renderTrending(data.articles.slice(0,5));

  } catch (e) {
    console.log(e);
    newsContainer.innerHTML = `
      <div class="text-red-500">
        Gagal load berita (cek Worker/API)
      </div>
    `;
  }
}

/* HEADLINE BESAR */
function renderHeadline(list) {
  headlineContainer.innerHTML = list.map(a => `
    <div class="bg-white dark:bg-gray-800 shadow">
      <img src="${a.urlToImage || 'https://via.placeholder.com/600'}"
        class="w-full h-60 object-cover">
      <div class="p-4">
        <h2 class="text-xl font-bold">${a.title}</h2>
      </div>
    </div>
  `).join("");
}

/* LIST BERITA */
function renderNews(list) {
  newsContainer.innerHTML = list.map(a => `
    <div class="bg-white dark:bg-gray-800 flex gap-4 p-3 shadow hover:shadow-lg transition">
      <img src="${a.urlToImage || 'https://via.placeholder.com/150'}"
        class="w-32 h-24 object-cover">

      <div>
        <h2 class="font-bold">${a.title}</h2>
        <p class="text-sm opacity-70">${a.description || ''}</p>
      </div>
    </div>
  `).join("");
}

/* TRENDING */
function renderTrending(list) {
  trendingContainer.innerHTML = list.map(a => `
    <div class="mb-2 text-sm border-b pb-1">
      ${a.title}
    </div>
  `).join("");
}

/* DARK MODE */
function toggleDark() {
  document.body.classList.toggle("dark");
}

loadNews();
</script>

</body>
</html>
