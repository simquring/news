<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NewsPro - Portal Berita Modern</title>

<!-- SEO -->
<meta name="description" content="Portal berita modern, cepat dan terpercaya">
<meta property="og:title" content="NewsPro">
<meta property="og:type" content="website">

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-white dark:bg-gray-900 text-gray-800 dark:text-white">

<!-- HEADER -->
<header class="p-4 shadow flex justify-between items-center">
  <h1 class="text-xl font-bold">NewsPro</h1>

  <div class="flex gap-3">
    <button onclick="toggleLang()">🌐</button>
    <button onclick="toggleDark()">🌙</button>
  </div>
</header>

<!-- SEARCH -->
<div class="p-4">
  <input id="search" type="text" placeholder="Search..."
    class="w-full p-2 border rounded">
</div>

<!-- NEWS LIST -->
<div id="news" class="grid md:grid-cols-3 gap-4 p-4"></div>

<!-- ADS -->
<div class="p-4 text-center">
  <!-- SLOT IKLAN -->
  <div class="border p-6">Ad Banner</div>
</div>

<!-- FOOTER -->
<footer class="p-6 text-center text-sm opacity-70">
  © 2026 NewsPro | About | Contact
</footer>

<script src="assets/js/api.js"></script>
<script src="assets/js/app.js"></script>

</body>
</html>
